  { id:49, scope:"期中", category:"Ch3 消費者行為", question:"看電影得到的每一元邊際效用為 5，爆米花每一元的邊際效用為 7。此時消費者為求效用最大應該：", options:["不必改變爆米花的購買數量", "多看一場電影", "少買一些爆米花", "多買一些爆米花"], answer:2, explanation:"MU/P較高的應少買使之均等" },

const shuffle = (arr) => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

const LABELS = ["A", "B", "C", "D"];
const QUIZ_SIZE = 10;

function parseSheetCSV(csvText) {
  const result = Papa.parse(csvText.trim(), { header: false, skipEmptyLines: true });
  const rows = result.data;
  if (rows.length < 2) return [];
  return rows.slice(1).map((r, i) => {
    const answerMap = { A: 0, B: 1, C: 2, D: 3 };
    return {
      id: i + 1, scope: (r[0] || "").trim(), category: (r[1] || "").trim(),
      question: (r[2] || "").trim(),
      options: [(r[3]||"").trim(), (r[4]||"").trim(), (r[5]||"").trim(), (r[6]||"").trim()],
      answer: answerMap[(r[7] || "").trim().toUpperCase()] ?? 0,
      explanation: (r[8] || "").trim(),
    };
  }).filter(q => q.question.length > 0);
}

function extractSheetId(input) {
  if (!input) return null;
  const m = input.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{20,}$/.test(input.trim())) return input.trim();
  return null;
}

            const isSel = selected === i, isCorr = i === question.answer;
            let bg = T.card, bdr = `1px solid ${T.brd}`, lBg = T.brdL, lCol = T.t4, tCol = T.t3;
            if (revealed) {
              if (isCorr) { bg = "rgba(52,211,153,0.1)"; bdr = "1px solid rgba(52,211,153,0.3)"; lBg = T.green; lCol = "#fff"; tCol = T.green; }
              else if (isSel) { bg = "rgba(248,113,113,0.1)"; bdr = "1px solid rgba(248,113,113,0.3)"; lBg = T.red; lCol = "#fff"; tCol = T.red; }
            } else if (isSel) { bg = "rgba(56,189,248,0.1)"; bdr = "1px solid rgba(56,189,248,0.3)"; lBg = T.accent; lCol = "#fff"; tCol = T.accent; }
            return (
              <button key={i} onClick={() => !revealed && onAnswer(i)} disabled={revealed} style={{
                display: "flex", alignItems: "center", gap: 12, padding: "13px 14px", background: bg, border: bdr, borderRadius: 14,
                cursor: revealed ? "default" : "pointer", textAlign: "left", fontFamily: T.font, transition: "all 0.2s ease",
              }}>
                <span style={{ minWidth: 30, height: 30, borderRadius: 9, background: lBg, color: lCol, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                  {revealed && isCorr ? "✓" : revealed && isSel && !isCorr ? "✗" : LABELS[i]}
                </span>
                <span style={{ color: tCol, fontSize: 14, lineHeight: 1.5, fontWeight: isSel || (revealed && isCorr) ? 600 : 400 }}>{opt}</span>
              </button>
            );
          })}
        </div>
        {revealed && question.explanation && (
          <div style={{ marginTop: 20, padding: 16, background: "rgba(56,189,248,0.06)", borderRadius: 14, borderLeft: `3px solid ${T.accent}`, animation: "fadeUp 0.3s ease" }}>
            <div style={{ color: T.accent, fontSize: 12, fontWeight: 700, marginBottom: 6 }}>💡 解析</div>
            <p style={{ color: T.t4, fontSize: 14, lineHeight: 1.7, margin: 0 }}>{question.explanation}</p>
          </div>
        )}
      </div>
    </div>
  );
}

function ResultScreen({ correct, total, onHome, onRetry, scopeLabel }) {
  const rate = Math.round((correct / total) * 100);
  const emoji = rate === 100 ? "🏆" : rate >= 80 ? "🎉" : rate >= 60 ? "👍" : "💪";
  const msg = rate === 100 ? "滿分！太厲害了！" : rate >= 80 ? "表現優異！" : rate >= 60 ? "不錯，繼續加油！" : "多練習幾次吧！";
  return (
    <div style={{ ...page, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "40px 24px" }}>
      <div style={{ fontSize: 64, marginBottom: 20 }}>{emoji}</div>
      <h2 style={{ color: T.t1, fontSize: 26, fontWeight: 800, margin: "0 0 6px" }}>{msg}</h2>
      <p style={{ color: T.t5, fontSize: 14, margin: "0 0 28px" }}>{scopeLabel} · 本回合成績</p>
      <div style={{ position: "relative", width: 160, height: 160, marginBottom: 32 }}>
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="68" fill="none" stroke={T.brdL} strokeWidth="10" />
          <circle cx="80" cy="80" r="68" fill="none" stroke={rate >= 70 ? T.green : T.orange} strokeWidth="10" strokeLinecap="round" strokeDasharray={`${(rate / 100) * 427} 427`} transform="rotate(-90 80 80)" style={{ transition: "stroke-dasharray 1s ease" }} />
        </svg>
        <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
          <span style={{ color: rate >= 70 ? T.green : T.orange, fontSize: 36, fontWeight: 800 }}>{rate}%</span>
          <span style={{ color: T.t5, fontSize: 13 }}>{correct} / {total}</span>
        </div>
      </div>
      <button onClick={onRetry} style={{ width: "100%", maxWidth: 320, padding: "18px 0", background: T.accentGrad, border: "none", borderRadius: 16, color: "#fff", fontSize: 17, fontWeight: 700, cursor: "pointer", boxShadow: "0 8px 32px rgba(56,189,248,0.3)", fontFamily: T.font, marginBottom: 12 }}
        onMouseDown={e => e.currentTarget.style.transform = "scale(0.97)"} onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}>再來一輪</button>
      <button onClick={onHome} style={{ width: "100%", maxWidth: 320, padding: "16px 0", background: T.card, border: `1px solid ${T.brd}`, borderRadius: 16, color: T.t4, fontSize: 15, fontWeight: 600, cursor: "pointer", fontFamily: T.font }}>回首頁</button>
    </div>
  );
}

function EconomicsQuiz() {
  const [screen, setScreen] = useState("home");
  const [showSettings, setShowSettings] = useState(false);
  const [sheetUrl, setSheetUrl] = useState("");
  const [allQuestions, setAllQuestions] = useState(DEFAULT_QUESTIONS);
  const [source, setSource] = useState("builtin");
  const [loading, setLoading] = useState(true);
  const [currentScope, setCurrentScope] = useState("全部");
  const [questions, setQuestions] = useState([]);
  const [currentQ, setCurrentQ] = useState(0);
  const [selected, setSelected] = useState(null);
  const [revealed, setRevealed] = useState(false);
  const [correctCount, setCorrectCount] = useState(0);
  const [stats, setStats] = useState({ correct: 0, wrong: 0, streak: 0 });
  const scopeLabel = currentScope === "期中" ? "期中考" : currentScope === "期末" ? "期末考" : "全範圍";

  const fetchFromSheet = async (url) => {
    const id = extractSheetId(url);
    if (!id) { setLoading(false); return; }
    setLoading(true);
    try {
      const res = await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv`);
      const text = await res.text();
      const parsed = parseSheetCSV(text);
      if (parsed.length > 0) { setAllQuestions(parsed); setSource("sheet"); }
      else { setAllQuestions(DEFAULT_QUESTIONS); setSource("builtin"); }
    } catch { setAllQuestions(DEFAULT_QUESTIONS); setSource("builtin"); }
    setLoading(false);
  };

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get("econ-quiz-sheet-url");
        if (r?.value) { setSheetUrl(r.value); await fetchFromSheet(r.value); }
        else { setLoading(false); }
      } catch { setLoading(false); }
    })();
  }, []);

  const handleSaveSettings = async (url) => {
    setSheetUrl(url); setShowSettings(false);
    try { await window.storage.set("econ-quiz-sheet-url", url); } catch {}
    if (url.trim()) { await fetchFromSheet(url); }
    else { setAllQuestions(DEFAULT_QUESTIONS); setSource("builtin"); }
  };

  useEffect(() => { window.__resetStats = () => setStats({ correct: 0, wrong: 0, streak: 0 }); return () => { delete window.__resetStats; }; }, []);

  const startQuiz = (scope) => {
    setCurrentScope(scope);
    const pool = scope === "全部" ? allQuestions : allQuestions.filter(q => q.scope === scope);
    const size = Math.min(QUIZ_SIZE, pool.length);
    setQuestions(shuffle(pool).slice(0, size));
    setCurrentQ(0); setSelected(null); setRevealed(false); setCorrectCount(0); setScreen("quiz");
  };

  const handleAnswer = (idx) => {
    setSelected(idx); setRevealed(true);
    const isCorrect = idx === questions[currentQ].answer;
    if (isCorrect) { setCorrectCount(c => c + 1); setStats(s => ({ ...s, correct: s.correct + 1, streak: s.streak + 1 })); }
    else { setStats(s => ({ ...s, wrong: s.wrong + 1, streak: 0 })); }
    setTimeout(() => {
      if (currentQ + 1 < questions.length) { setCurrentQ(c => c + 1); setSelected(null); setRevealed(false); }
      else { setScreen("result"); }
    }, 2200);
  };

  useEffect(() => {
    const s = document.createElement("style");
    s.textContent = `@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700;800&display=swap');
      @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
      @keyframes fadeIn{from{opacity:0}to{opacity:1}}
      @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
      @keyframes spin{to{transform:rotate(360deg)}}`;
    document.head.appendChild(s);
    return () => document.head.removeChild(s);
  }, []);

  if (loading) return (
    <div style={{ ...page, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 40 }}>
      <div style={{ width: 48, height: 48, border: "3px solid rgba(255,255,255,0.1)", borderTop: `3px solid ${T.accent}`, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
      <p style={{ color: T.t4, fontSize: 14, marginTop: 20 }}>正在載入題庫...</p>
    </div>
  );

  return (
    <>
      {showSettings && <SettingsPanel sheetUrl={sheetUrl} onSave={handleSaveSettings} onClose={() => setShowSettings(false)} />}
      {screen === "home" && <HomeScreen onStart={startQuiz} stats={stats} onOpenSettings={() => setShowSettings(true)} allQuestions={allQuestions} source={source} />}
      {screen === "quiz" && questions[currentQ] && <QuizScreen question={questions[currentQ]} qIndex={currentQ} total={questions.length} onAnswer={handleAnswer} selected={selected} revealed={revealed} scopeLabel={scopeLabel} />}
      {screen === "result" && <ResultScreen correct={correctCount} total={questions.length} onRetry={() => startQuiz(currentScope)} onHome={() => setScreen("home")} scopeLabel={scopeLabel} />}
    </>
  );
}


    ReactDOM.createRoot(document.getElementById("root")).render(<EconomicsQuiz />);
  </script>
</body>
</html>
